version: 2

models:
  - name: fct_orders
    description: "Core fact table containing item-level transactional data bridging customers and products."
    columns:
      - name: order_item_key
        description: "Unique primary key generated by hashing order_id and product_id."
        tests:
          - unique
          - not_null

      - name: order_status
        description: "The operational delivery status of the order transaction."
        tests:
          - accepted_values:
              arguments:
                values:
                  - delivered
                  - shipped
                  - canceled
                  - invoiced
                  - processing
                  - approved
                  - unavailable
                  - created
      
  - name: dim_customers
    description: "Core dimension table aggregating lifecycle metrics and lifetime value (CLV) per unique customer."
    columns:
      - name: customer_unique_id
        description: "The master unique identifier for an individual human customer."
        tests:
          - unique
          - not_null
          
  - name: dim_products
    description: "Core dimension table containing product attributes mapped to English category names."
    columns:
      - name: product_id
        description: "The unique primary key for each product."
        tests:
          - unique
          - not_null